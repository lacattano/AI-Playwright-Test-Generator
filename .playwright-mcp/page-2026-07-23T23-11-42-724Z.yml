                        - emphasis [ref=e904]: (optional)
                        - link "#" [ref=e905] [cursor=pointer]:
                          - /url: "#frame-locator-locator-option-has"
                      - paragraph [ref=e906]:
                        - text: Narrows down the results of the method to those which contain elements matching this relative locator. For example,
                        - code [ref=e907]: article
                        - text: that has
                        - code [ref=e908]: text=Playwright
                        - text: matches
                        - code [ref=e909]: <article><div>Playwright</div></article>
                        - text: .
                      - paragraph [ref=e910]:
                        - text: Inner locator
                        - strong [ref=e911]: must be relative
                        - text: to the outer locator and is queried starting with the outer locator match, not the document root. For example, you can find
                        - code [ref=e912]: content
                        - text: that has
                        - code [ref=e913]: div
                        - text: in
                        - code [ref=e914]: <article><content><div>Playwright</div></content></article>
                        - text: . However, looking for
                        - code [ref=e915]: content
                        - text: that has
                        - code [ref=e916]: article div
                        - text: will fail, because the inner locator must be relative and should not use any elements outside the
                        - code [ref=e917]: content
                        - text: .
                      - paragraph [ref=e918]:
                        - text: Note that outer and inner locators must belong to the same frame. Inner locator must not contain
                        - link "FrameLocator" [ref=e919] [cursor=pointer]:
                          - /url: /docs/api/class-framelocator
                        - text: s.
                    - listitem [ref=e920]:
                      - paragraph [ref=e921]:
                        - code [ref=e922]: hasNot
                        - link "Locator" [ref=e923] [cursor=pointer]:
