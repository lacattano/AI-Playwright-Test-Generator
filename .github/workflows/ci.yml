name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Auto-cancel stale runs when a newer commit lands on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Gate 0: Smoke test (offline, <1s, catches resolver/parsing breaks)
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run smoke test
        run: uv run python scripts/smoke.py --json

  # ── Gate 1: Project integrity (parallel with smoke) ──────────────────
  sanitizer:
    name: Project Sanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Project Sanitizer (check-only)
        run: uv run python scripts/maintenance/project_sanitizer.py --check-only

  # ── Gate 1b: Graph freshness (warning-only, non-blocking) ─────────────
  graph-freshness:
    name: Graph Freshness Check
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check knowledge graph freshness
        run: |
          if [ ! -f graphify-out/graph.json ]; then
            echo "::warning::No graphify-out/graph.json found — knowledge graph not generated"
            exit 0
          fi
          GRAPH_COMMIT=$(python -c "import json,sys; d=json.load(open('graphify-out/graph.json')); print(d.get('built_at_commit',''))" 2>/dev/null || echo "")
          HEAD=$(git rev-parse HEAD)
          if [ -z "$GRAPH_COMMIT" ]; then
            echo "::warning::Could not read gitCommit from graph.json"
          elif [ "$GRAPH_COMMIT" != "$HEAD" ]; then
            echo "::warning::Knowledge graph is stale (graph: $GRAPH_COMMIT, head: $HEAD)"
            echo "Run 'graphify update .' locally to refresh"
          else
            echo "✅ Knowledge graph is up to date"
          fi

  # ── Gate 1c: Documentation coverage (warning-only, non-blocking) ──────
  docs-coverage:
    name: Documentation Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check markdown_docs coverage
        run: |
          if [ ! -f markdown_docs/.sweep_progress.json ]; then
            echo "::warning::No markdown_docs/.sweep_progress.json found"
            exit 0
          fi
          python -c "
          import json, sys
          d = json.load(open('markdown_docs/.sweep_progress.json'))
          pending = d.get('pending', 0)
          if pending > 0:
              print(f'::warning::{pending} file(s) pending documentation')
              sys.exit(0)  # non-blocking warning
          else:
              print(f'✅ All {d.get(\"total\", 0)} files documented')
          "

  # ── Gate 2: Quality gates (run in parallel after smoke) ──────────────
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format --check
        run: uv run ruff format --check .

  type-check:
    name: MyPy Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy src/ cli/

  # ── Gate 3: Test execution (needs lint + type-check green) ────────────
  test:
    name: PyTest + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}

      - name: Install Playwright Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: uv run playwright install --with-deps chromium

      - name: Run tests with coverage
        run: |
          echo "CI environment detected: ${{ env.CI }}"
          uv run pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-diagnostics
          path: |
            test-results/
            screenshots/
          retention-days: 7
