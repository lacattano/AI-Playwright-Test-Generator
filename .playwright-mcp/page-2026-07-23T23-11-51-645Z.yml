              - generic [ref=f1e3741]:
                - code [ref=f1e3743]:
                  - generic [ref=f1e3744]: await page.routeFromHAR(har);
                  - generic [ref=f1e3745]: await page.routeFromHAR(har, options);
                - button "Copy code to clipboard" [ref=f1e3747] [cursor=pointer]
