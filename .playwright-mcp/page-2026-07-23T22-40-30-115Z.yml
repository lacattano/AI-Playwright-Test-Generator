              - list [ref=e1048]:
                - listitem [ref=e1049]: UI Mode has an option to only show tests affected by source changes.
                - listitem [ref=e1050]: UI Mode and Trace Viewer have improved action filtering.
                - listitem [ref=e1051]: HTML Reporter shows the list of runs from the same worker.
                - listitem [ref=e1052]: HTML Reporter allows filtering test steps for quick search.
                - listitem [ref=e1053]:
                  - text: New trace mode
                  - code [ref=e1054]: "'retain-on-failure-and-retries'"
                  - text: records a trace for each test run and retains all traces when an attempt fails — great for comparing a passing trace with a failing one from a flaky test.
