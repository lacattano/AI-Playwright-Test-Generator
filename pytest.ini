[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
pythonpath = .
addopts = -v -n auto -m "not slow and not integration"
norecursedirs = generated_tests .git .venv
filterwarnings =
    ignore::DeprecationWarning
markers =
    evidence: Mark test with evidence metadata (condition_ref, story_ref)
    slow: Marks tests as slow (deselect with '-m "not slow"')
    integration: Marks tests as integration tests (deselect with '-m "not integration"')
