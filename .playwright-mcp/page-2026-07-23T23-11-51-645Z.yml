              - paragraph [ref=f1e488]: When testing a web page, sometimes unexpected overlays like a "Sign up" dialog appear and block actions you want to automate, e.g. clicking a button. These overlays don't always show up in the same way or at the same time, making them tricky to handle in automated tests.
              - paragraph [ref=f1e489]: This method lets you set up a special function, called a handler, that activates when it detects that overlay is visible. The handler's job is to remove the overlay, allowing your test to continue as if the overlay wasn't there.
              - paragraph [ref=f1e490]: "Things to keep in mind:"
              - list [ref=f1e491]:
                - listitem [ref=f1e492]:
                  - text: When an overlay is shown predictably, we recommend explicitly waiting for it in your test and dismissing it as a part of your normal test flow, instead of using
                  - link "page.addLocatorHandler()" [ref=f1e493] [cursor=pointer]:
                    - /url: /docs/api/class-page#page-add-locator-handler
                  - text: .
                - listitem [ref=f1e494]:
                  - text: Playwright checks for the overlay every time before executing or retrying an action that requires an
                  - link "actionability check" [ref=f1e495] [cursor=pointer]:
                    - /url: /docs/actionability
                  - text: ", or before performing an auto-waiting assertion check. When overlay is visible, Playwright calls the handler first, and then proceeds with the action/assertion. Note that the handler is only called when you perform an action/assertion - if the overlay becomes visible but you don't perform any actions, the handler will not be triggered."
                - listitem [ref=f1e496]:
                  - text: After executing the handler, Playwright will ensure that overlay that triggered the handler is not visible anymore. You can opt-out of this behavior with
                  - link "noWaitAfter" [ref=f1e497] [cursor=pointer]:
                    - /url: /docs/api/class-page#page-add-locator-handler-option-no-wait-after
                  - text: .
                - listitem [ref=f1e498]: The execution time of the handler counts towards the timeout of the action/assertion that executed the handler. If your handler takes too long, it might cause timeouts.
                - listitem [ref=f1e499]: You can register multiple handlers. However, only a single handler will be running at a time. Make sure the actions within a handler don't depend on another handler.
              - generic [ref=f1e500]:
                - generic [ref=f1e501]: warning
                - generic [ref=f1e505]:
                  - paragraph [ref=f1e506]: Running the handler will alter your page state mid-test. For example it will change the currently focused element and move the mouse. Make sure that actions that run after the handler are self-contained and do not rely on the focus and mouse state being unchanged.
                  - paragraph [ref=f1e507]:
                    - text: For example, consider a test that calls
                    - link "locator.focus()" [ref=f1e508] [cursor=pointer]:
                      - /url: /docs/api/class-locator#locator-focus
                    - text: followed by
                    - link "keyboard.press()" [ref=f1e509] [cursor=pointer]:
                      - /url: /docs/api/class-keyboard#keyboard-press
                    - text: . If your handler clicks a button between these two actions, the focused element most likely will be wrong, and key press will happen on the unexpected element. Use
                    - link "locator.press()" [ref=f1e510] [cursor=pointer]:
                      - /url: /docs/api/class-locator#locator-press
                    - text: instead to avoid this problem.
                  - paragraph [ref=f1e511]:
                    - text: Another example is a series of mouse actions, where
                    - link "mouse.move()" [ref=f1e512] [cursor=pointer]:
                      - /url: /docs/api/class-mouse#mouse-move
                    - text: is followed by
                    - link "mouse.down()" [ref=f1e513] [cursor=pointer]:
                      - /url: /docs/api/class-mouse#mouse-down
                    - text: . Again, when the handler runs between these two actions, the mouse position will be wrong during the mouse down. Prefer self-contained actions like
                    - link "locator.click()" [ref=f1e514] [cursor=pointer]:
                      - /url: /docs/api/class-locator#locator-click
                    - text: that do not rely on the state being unchanged by a handler.
