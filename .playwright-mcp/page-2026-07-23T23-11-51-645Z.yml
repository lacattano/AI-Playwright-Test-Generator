                        - link "#" [ref=f1e3809] [cursor=pointer]:
                          - /url: "#page-route-from-har-option-url"
                      - paragraph [ref=f1e3810]: A glob pattern, regular expression or predicate to match the request URL. Only requests with URL matching the pattern will be served from the HAR file. If not specified, all requests are served from the HAR file.
