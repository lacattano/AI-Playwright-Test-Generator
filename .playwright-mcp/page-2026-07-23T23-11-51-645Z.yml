              - text: "Added in: v1.48"
              - paragraph [ref=f1e3499]: Request the page to perform garbage collection. Note that there is no guarantee that all unreachable objects will be collected.
              - paragraph [ref=f1e3500]:
                - text: This is useful to help detect memory leaks. For example, if your page has a large object
                - code [ref=f1e3501]: "'suspect'"
                - text: that might be leaked, you can check that it does not leak by using a
                - link [ref=f1e3502] [cursor=pointer]:
                  - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/WeakRef
                  - code [ref=f1e3503]: WeakRef
                - text: .
              - generic [ref=f1e3505]:
                - code [ref=f1e3507]:
                  - generic [ref=f1e3508]: // 1. In your page, save a WeakRef for the "suspect".
                  - generic [ref=f1e3509]: await page.evaluate(() => globalThis.suspectWeakRef = new WeakRef(suspect));
                  - generic [ref=f1e3510]: // 2. Request garbage collection.
                  - generic [ref=f1e3511]: await page.requestGC();
                  - generic [ref=f1e3512]: // 3. Check that weak ref does not deref to the original object.
                  - generic [ref=f1e3513]: expect(await page.evaluate(() => !globalThis.suspectWeakRef.deref())).toBe(true);
                - generic [ref=f1e3514]:
                  - button "Toggle word wrap" [ref=f1e3515] [cursor=pointer]
