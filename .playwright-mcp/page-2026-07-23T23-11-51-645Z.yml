                    - listitem [ref=f1e3904]:
                      - paragraph [ref=f1e3905]:
                        - code [ref=f1e3906]: animations
                        - text: "\"disabled\" | \"allow\""
                        - emphasis [ref=f1e3907]: (optional)
                        - link "#" [ref=f1e3908] [cursor=pointer]:
                          - /url: "#page-screenshot-option-animations"
                      - paragraph [ref=f1e3909]:
                        - text: When set to
                        - code [ref=f1e3910]: "\"disabled\""
                        - text: ", stops CSS animations, CSS transitions and Web Animations. Animations get different treatment depending on their duration:"
                      - list [ref=f1e3911]:
                        - listitem [ref=f1e3912]:
                          - text: finite animations are fast-forwarded to completion, so they'll fire
                          - code [ref=f1e3913]: transitionend
                          - text: event.
                        - listitem [ref=f1e3914]: infinite animations are canceled to initial state, and then played over after the screenshot.
                      - paragraph [ref=f1e3915]:
                        - text: Defaults to
                        - code [ref=f1e3916]: "\"allow\""
                        - text: that leaves animations untouched.
                    - listitem [ref=f1e3917]:
                      - paragraph [ref=f1e3918]:
                        - code [ref=f1e3919]: caret
                        - text: "\"hide\" | \"initial\""
                        - emphasis [ref=f1e3920]: (optional)
                        - link "#" [ref=f1e3921] [cursor=pointer]:
                          - /url: "#page-screenshot-option-caret"
                      - paragraph [ref=f1e3922]:
                        - text: When set to
                        - code [ref=f1e3923]: "\"hide\""
                        - text: ", screenshot will hide text caret. When set to"
                        - code [ref=f1e3924]: "\"initial\""
                        - text: ", text caret behavior will not be changed. Defaults to"
                        - code [ref=f1e3925]: "\"hide\""
                        - text: .
