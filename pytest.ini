[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# Tells pytest to ignore dataclasses/helper classes named 'TestCase' so it stops throwing warnings
python_classes = Test* !TestCase
pythonpath = .
# Changed '-n auto' to '-n 8' to cap RAM usage, and added '--dist=loadfile'
addopts = -v -n 8 --dist=loadfile -m "not slow and not integration"
norecursedirs = generated_tests .git .venv
filterwarnings =
    ignore::DeprecationWarning
markers =
    evidence: Mark test with evidence metadata (condition_ref, story_ref)
    slow: Marks tests as slow (deselect with '-m "not slow"')
    integration: Marks tests as integration tests (deselect with '-m "not integration"')