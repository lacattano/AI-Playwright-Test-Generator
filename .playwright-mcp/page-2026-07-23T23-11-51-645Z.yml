                  - button "Copy code to clipboard" [ref=f1e3624] [cursor=pointer]
              - paragraph [ref=f1e3630]: "or the same snippet using a regex pattern instead:"
              - generic [ref=f1e3632]:
                - code [ref=f1e3634]:
                  - generic [ref=f1e3635]: const page = await browser.newPage();
                  - generic [ref=f1e3636]: await page.route(/(\.png$)|(\.jpg$)/, route => route.abort());
                  - generic [ref=f1e3637]: await page.goto('https://example.com');
                  - generic [ref=f1e3638]: await browser.close();
                - generic [ref=f1e3639]:
                  - button "Toggle word wrap" [ref=f1e3640] [cursor=pointer]
                  - button "Copy code to clipboard" [ref=f1e3643] [cursor=pointer]
              - paragraph [ref=f1e3649]: "It is possible to examine the request to decide the route action. For example, mocking all requests that contain some post data, and leaving all other requests as is:"
              - generic [ref=f1e3651]:
                - code [ref=f1e3653]:
                  - generic [ref=f1e3654]: "await page.route('/api/**', async route => {"
                  - generic [ref=f1e3655]: if (route.request().postData().includes('my-string'))
                  - generic [ref=f1e3656]: "await route.fulfill({ body: 'mocked-data' });"
                  - generic [ref=f1e3657]: else
                  - generic [ref=f1e3658]: await route.continue();
                  - generic [ref=f1e3659]: "});"
                - button "Copy code to clipboard" [ref=f1e3661] [cursor=pointer]
              - paragraph [ref=f1e3667]: If a request matches multiple registered routes, the most recently registered route takes precedence.
              - paragraph [ref=f1e3668]:
                - text: Page routes take precedence over browser context routes (set up with
                - link "browserContext.route()" [ref=f1e3669] [cursor=pointer]:
                  - /url: /docs/api/class-browsercontext#browser-context-route
                - text: ) when request matches both handlers.
              - paragraph [ref=f1e3670]:
                - text: To remove a route with its handler you can use
                - link "page.unroute()" [ref=f1e3671] [cursor=pointer]:
                  - /url: /docs/api/class-page#page-unroute
                - text: .
              - generic [ref=f1e3672]:
                - generic [ref=f1e3673]: note
                - paragraph [ref=f1e3678]: Enabling routing disables http cache.
