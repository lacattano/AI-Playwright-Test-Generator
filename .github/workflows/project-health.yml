name: Project Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sanitizer:
    name: Project Sanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (package manager)
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Project Sanitizer (check-only)
        run: uv run python scripts/project_sanitizer.py --check-only

  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: sanitizer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ruff format
        run: uv run ruff format --check .

  mypy:
    name: MyPy Type Checker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ruff

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Run mypy
        run: uv run mypy .

  pytest:
    name: PyTest (Unit Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: mypy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -v --tb=short