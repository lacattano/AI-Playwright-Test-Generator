                            - link "number" [ref=f1e3951] [cursor=pointer]:
                              - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Number_type
                          - paragraph [ref=f1e3952]: height of clipping area
                      - paragraph [ref=f1e3953]: An object which specifies clipping of the resulting image.
                    - listitem [ref=f1e3954]:
                      - paragraph [ref=f1e3955]:
                        - code [ref=f1e3956]: fullPage
                        - link "boolean" [ref=f1e3957] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Boolean_type
                        - emphasis [ref=f1e3958]: (optional)
                        - link "#" [ref=f1e3959] [cursor=pointer]:
                          - /url: "#page-screenshot-option-full-page"
                      - paragraph [ref=f1e3960]:
                        - text: When true, takes a screenshot of the full scrollable page, instead of the currently visible viewport. Defaults to
                        - code [ref=f1e3961]: "false"
                        - text: .
                    - listitem [ref=f1e3962]:
                      - paragraph [ref=f1e3963]:
                        - code [ref=f1e3964]: mask
                        - link "Array" [ref=f1e3965] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array
                        - text: <
                        - link "Locator" [ref=f1e3966] [cursor=pointer]:
                          - /url: /docs/api/class-locator
                        - text: ">"
                        - emphasis [ref=f1e3967]: (optional)
                        - link "#" [ref=f1e3968] [cursor=pointer]:
                          - /url: "#page-screenshot-option-mask"
                      - paragraph [ref=f1e3969]:
                        - text: Specify locators that should be masked when the screenshot is taken. Masked elements will be overlaid with a pink box
                        - code [ref=f1e3970]: "#FF00FF"
                        - text: (customized by
                        - link "maskColor" [ref=f1e3971] [cursor=pointer]:
                          - /url: /docs/api/class-page#page-screenshot-option-mask-color
                        - text: ) that completely covers its bounding box. The mask is also applied to invisible elements, see
                        - link "Matching only visible elements" [ref=f1e3972] [cursor=pointer]:
                          - /url: /docs/locators#matching-only-visible-elements
                        - text: to disable that.
                    - listitem [ref=f1e3973]:
                      - paragraph [ref=f1e3974]:
                        - code [ref=f1e3975]: maskColor
                        - link "string" [ref=f1e3976] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#String_type
                        - emphasis [ref=f1e3977]: (optional)
                        - text: "Added in: v1.35"
                        - link "#" [ref=f1e3978] [cursor=pointer]:
                          - /url: "#page-screenshot-option-mask-color"
                      - paragraph [ref=f1e3979]:
                        - text: Specify the color of the overlay box for masked elements, in
                        - link "CSS color format" [ref=f1e3980] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/CSS/color_value
                        - text: . Default color is pink
                        - code [ref=f1e3981]: "#FF00FF"
                        - text: .
                    - listitem [ref=f1e3982]:
                      - paragraph [ref=f1e3983]:
                        - code [ref=f1e3984]: omitBackground
                        - link "boolean" [ref=f1e3985] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Boolean_type
                        - emphasis [ref=f1e3986]: (optional)
                        - link "#" [ref=f1e3987] [cursor=pointer]:
                          - /url: "#page-screenshot-option-omit-background"
                      - paragraph [ref=f1e3988]:
                        - text: Hides default white background and allows capturing screenshots with transparency. Not applicable to
                        - code [ref=f1e3989]: jpeg
                        - text: images. Defaults to
                        - code [ref=f1e3990]: "false"
                        - text: .
                    - listitem [ref=f1e3991]:
                      - paragraph [ref=f1e3992]:
                        - code [ref=f1e3993]: path
                        - link "string" [ref=f1e3994] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#String_type
                        - emphasis [ref=f1e3995]: (optional)
                        - link "#" [ref=f1e3996] [cursor=pointer]:
                          - /url: "#page-screenshot-option-path"
                      - paragraph [ref=f1e3997]:
                        - text: The file path to save the image to. The screenshot type will be inferred from file extension. If
                        - link "path" [ref=f1e3998] [cursor=pointer]:
                          - /url: /docs/api/class-page#page-screenshot-option-path
                        - text: is a relative path, then it is resolved relative to the current working directory. If no path is provided, the image won't be saved to the disk.
                    - listitem [ref=f1e3999]:
                      - paragraph [ref=f1e4000]:
                        - code [ref=f1e4001]: quality
                        - link "number" [ref=f1e4002] [cursor=pointer]:
                          - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Number_type
                        - emphasis [ref=f1e4003]: (optional)
                        - link "#" [ref=f1e4004] [cursor=pointer]:
                          - /url: "#page-screenshot-option-quality"
                      - paragraph [ref=f1e4005]:
                        - text: The quality of the image, between 0-100. Not applicable to
                        - code [ref=f1e4006]: png
                        - text: images.
                    - listitem [ref=f1e4007]:
                      - paragraph [ref=f1e4008]:
                        - code [ref=f1e4009]: scale
                        - text: "\"css\" | \"device\""
                        - emphasis [ref=f1e4010]: (optional)
                        - link "#" [ref=f1e4011] [cursor=pointer]:
                          - /url: "#page-screenshot-option-scale"
                      - paragraph [ref=f1e4012]:
                        - text: When set to
                        - code [ref=f1e4013]: "\"css\""
                        - text: ", screenshot will have a single pixel per each css pixel on the page. For high-dpi devices, this will keep screenshots small. Using"
                        - code [ref=f1e4014]: "\"device\""
                        - text: option will produce a single pixel per each device pixel, so screenshots of high-dpi devices will be twice as large or even larger.
                      - paragraph [ref=f1e4015]:
                        - text: Defaults to
                        - code [ref=f1e4016]: "\"device\""
                        - text: .
                    - listitem [ref=f1e4017]:
                      - paragraph [ref=f1e4018]:
                        - code [ref=f1e4019]: style
