[pytest]
# Discovery paths and naming conventions
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
pythonpath = .

# Execution options
# Reduced '-n 8' to '-n 4' to prevent resource contention crashes on Windows
# Subprocess tests are serialized via conftest lock to avoid contention
addopts = 
    -v 
    -n 4 
    --dist=loadfile 
    -m "not slow and not integration"

# Directories to skip during collection
norecursedirs = generated_tests .git .venv

# Warning management
filterwarnings =
    ignore::DeprecationWarning
    # Silences collection warnings if any helper/dataclasses are named 'TestCase'
    ignore:.*cannot collect test class 'TestCase'.*:pytest.PytestCollectionWarning

# Custom test markers
markers =
    evidence: Mark test with evidence metadata (condition_ref, story_ref)
    slow: Marks tests as slow (deselect with '-m "not slow"')
    integration: Marks tests as integration tests (deselect with '-m "not integration"')
    subprocess: Tests that spawn subprocesses (serialized to avoid resource contention)