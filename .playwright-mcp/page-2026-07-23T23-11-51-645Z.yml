              - text: Added before v1.9
              - paragraph [ref=f1e3580]: Routing provides the capability to modify network requests that are made by a page.
              - paragraph [ref=f1e3581]: Once routing is enabled, every request matching the url pattern will stall unless it's continued, fulfilled or aborted.
              - generic [ref=f1e3582]:
                - generic [ref=f1e3583]: note
                - paragraph [ref=f1e3588]: The handler will only be called for the first url if the response is a redirect.
              - generic [ref=f1e3589]:
                - generic [ref=f1e3590]: note
                - paragraph [ref=f1e3595]:
                  - link "page.route()" [ref=f1e3596] [cursor=pointer]:
                    - /url: /docs/api/class-page#page-route
                  - text: will not intercept requests intercepted by Service Worker. See
                  - link "this" [ref=f1e3597] [cursor=pointer]:
                    - /url: https://github.com/microsoft/playwright/issues/1090
                  - text: issue. We recommend disabling Service Workers when using request interception by setting
                  - link "serviceWorkers" [ref=f1e3598] [cursor=pointer]:
                    - /url: /docs/api/class-browser#browser-new-context-option-service-workers
                  - text: to
                  - code [ref=f1e3599]: "'block'"
                  - text: .
              - generic [ref=f1e3600]:
                - generic [ref=f1e3601]: note
                - paragraph [ref=f1e3606]:
                  - link "page.route()" [ref=f1e3607] [cursor=pointer]:
                    - /url: /docs/api/class-page#page-route
                  - text: will not intercept the first request of a popup page. Use
                  - link "browserContext.route()" [ref=f1e3608] [cursor=pointer]:
                    - /url: /docs/api/class-browsercontext#browser-context-route
                  - text: instead.
              - paragraph [ref=f1e3609]:
                - strong [ref=f1e3610]: Usage
              - paragraph [ref=f1e3611]: "An example of a naive handler that aborts all image requests:"
              - generic [ref=f1e3613]:
                - code [ref=f1e3615]:
                  - generic [ref=f1e3616]: const page = await browser.newPage();
                  - generic [ref=f1e3617]: "await page.route('**/*.{png,jpg,jpeg}', route => route.abort());"
                  - generic [ref=f1e3618]: await page.goto('https://example.com');
                  - generic [ref=f1e3619]: await browser.close();
                - generic [ref=f1e3620]:
