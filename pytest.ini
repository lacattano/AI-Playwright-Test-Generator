[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# Tells pytest to ignore dataclasses/helper classes named 'TestCase' so it stops throwing warnings
python_classes = Test* !TestCase
pythonpath = .
# Reduced '-n 8' to '-n 4' to prevent resource contention crashes on Windows
# Subprocess tests are serialized via conftest lock to avoid contention
addopts = -v -n 4 --dist=loadfile -m "not slow and not integration"
norecursedirs = generated_tests .git .venv
filterwarnings =
    ignore::DeprecationWarning
markers =
    evidence: Mark test with evidence metadata (condition_ref, story_ref)
    slow: Marks tests as slow (deselect with '-m "not slow"')
    integration: Marks tests as integration tests (deselect with '-m "not integration"')
    subprocess: Tests that spawn subprocesses (serialized to avoid resource contention)
