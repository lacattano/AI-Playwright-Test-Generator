                        - emphasis [ref=e924]: (optional)
                        - text: "Added in: v1.33"
                        - link "#" [ref=e925] [cursor=pointer]:
                          - /url: "#frame-locator-locator-option-has-not"
                      - paragraph [ref=e926]:
                        - text: Matches elements that do not contain an element that matches an inner locator. Inner locator is queried against the outer one. For example,
                        - code [ref=e927]: article
                        - text: that does not have
                        - code [ref=e928]: div
                        - text: matches
                        - code [ref=e929]: <article><span>Playwright</span></article>
                        - text: .
                      - paragraph [ref=e930]:
                        - text: Note that outer and inner locators must belong to the same frame. Inner locator must not contain
                        - link "FrameLocator" [ref=e931] [cursor=pointer]:
                          - /url: /docs/api/class-framelocator
                        - text: s.
