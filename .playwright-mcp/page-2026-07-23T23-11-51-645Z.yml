                            - link "number" [ref=f1e3941] [cursor=pointer]:
                              - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Number_type
                          - paragraph [ref=f1e3942]: y-coordinate of top-left corner of clip area
                        - listitem [ref=f1e3943]:
                          - paragraph [ref=f1e3944]:
                            - code [ref=f1e3945]: width
                            - link "number" [ref=f1e3946] [cursor=pointer]:
                              - /url: https://developer.mozilla.org/en-US/docs/Web/JavaScript/Data_structures#Number_type
                          - paragraph [ref=f1e3947]: width of clipping area
                        - listitem [ref=f1e3948]:
