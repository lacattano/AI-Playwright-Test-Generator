              - generic [ref=f1e5392]:
                - code [ref=f1e5394]:
                  - generic [ref=f1e5395]: "try {"
                  - generic [ref=f1e5396]: // Crash might happen during a click.
                  - generic [ref=f1e5397]: await page.click('button');
                  - generic [ref=f1e5398]: // Or while waiting for an event.
                  - generic [ref=f1e5399]: await page.waitForEvent('popup');
                  - generic [ref=f1e5400]: "} catch (e) {"
                  - generic [ref=f1e5401]: // When the page crashes, exception message contains 'crash'.
                  - generic [ref=f1e5402]: "}"
