              - text: "Added in: v1.56"
              - paragraph [ref=f1e3548]:
                - text: Returns up to (currently) 100 last network request from this page. See
                - link "page.on('request')" [ref=f1e3549] [cursor=pointer]:
                  - /url: /docs/api/class-page#page-event-request
                - text: for more details.
              - paragraph [ref=f1e3550]: Returned requests should be accessed immediately, otherwise they might be collected to prevent unbounded memory growth as new requests come in. Once collected, retrieving most information about the request is impossible.
              - paragraph [ref=f1e3551]:
                - text: Note that requests reported through the
                - link "page.on('request')" [ref=f1e3552] [cursor=pointer]:
                  - /url: /docs/api/class-page#page-event-request
                - text: request are not collected, so there is a trade off between efficient memory usage with
                - link "page.requests()" [ref=f1e3553] [cursor=pointer]:
                  - /url: /docs/api/class-page#page-requests
                - text: and the amount of available information reported through
                - link "page.on('request')" [ref=f1e3554] [cursor=pointer]:
                  - /url: /docs/api/class-page#page-event-request
                - text: .
