              - paragraph [ref=e813]:
                - strong [ref=e814]: Details
              - paragraph [ref=e815]: Matching by text always normalizes whitespace, even with exact match. For example, it turns multiple spaces into one, turns line breaks into spaces and ignores leading and trailing whitespace.
              - paragraph [ref=e816]:
                - text: Input elements of the type
                - code [ref=e817]: button
                - text: and
                - code [ref=e818]: submit
                - text: are matched by their
                - code [ref=e819]: value
                - text: instead of the text content. For example, locating by text
                - code [ref=e820]: "\"Log in\""
                - text: matches
                - code [ref=e821]: <input type=button value="Log in">
                - text: .
